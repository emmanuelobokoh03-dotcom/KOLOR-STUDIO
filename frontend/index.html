    <!-- Iter 182 — Critical CSS: branded splash + shimmer renders before React parses -->
    <style id="ks-critical">
      @media (prefers-reduced-motion: no-preference) {
        @keyframes ks-shimmer {
          0%   { background-position: -200% 0; }
          100% { background-position:  200% 0; }
        }
        .ks-shimmer {
          background: linear-gradient(90deg,#ede9fe 0%,#ddd6fe 20%,#c4b5fd 40%,#ddd6fe 60%,#ede9fe 80%);
          background-size: 200% 100%;
          animation: ks-shimmer 1.6s ease-in-out infinite;
        }
        @keyframes ks-fade-in {
          from { opacity: 0; transform: translateY(6px); }
          to   { opacity: 1; transform: translateY(0); }
        }
        #root:empty .ks-splash-inner {
          animation: ks-fade-in 0.4s ease-out 0.1s both;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .ks-shimmer { background: #ede9fe; }
      }
      /* Branded splash — visible before React mounts */
      #root:empty {
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: #080612;
        display: -webkit-flex;
        display: flex;
        -webkit-align-items: center;
        align-items: center;
        -webkit-justify-content: center;
        justify-content: center;
        z-index: 9999;
      }
    </style>
    <link rel="preconnect" href="https://fonts.googleapis.com">
