<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- AUDIT FIX [10.2]: Replace default Vite favicon with KOLOR branding -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#080612" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- Primary meta -->
    <!-- AUDIT FIX [8.1]: Open Graph and Twitter card meta tags -->
    <title>KOLOR Studio — CRM for Creative Professionals</title>
    <meta name="description" content="The CRM built for photographers, designers, and artists. Leads, quotes, contracts, and calendar — in one tool. Free for the first 20 users." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://kolorstudio.app" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://kolorstudio.app" />
    <meta property="og:title" content="KOLOR Studio — CRM for Creative Professionals" />
    <meta property="og:description" content="The CRM built for photographers, designers, and artists. Leads, quotes, contracts, and calendar — in one beautiful tool." />
    <meta property="og:image" content="https://kolorstudio.app/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="KOLOR Studio" />

    <!-- Twitter/X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="KOLOR Studio — CRM for Creative Professionals" />
    <meta name="twitter:description" content="The CRM built for photographers, designers, and artists. Free for the first 20 beta users." />
    <meta name="twitter:image" content="https://kolorstudio.app/og-image.png" />

    <!-- AUDIT FIX [3.5]: Google Fonts with display=swap for all families -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;0,9..144,800&family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@400;600;700;800&family=Montserrat:wght@400;500;600;700;800&family=Libre+Baskerville:wght@400;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
