    <!-- Iter 182 — Critical CSS: branded splash + shimmer renders before React parses -->
    <style id="ks-critical">
      @media (prefers-reduced-motion: no-preference) {
        @keyframes ks-shimmer {
          0%   { background-position: -200% 0; }
          100% { background-position:  200% 0; }
        }
        .ks-shimmer {
          background: linear-gradient(90deg,#ede9fe 0%,#ddd6fe 20%,#c4b5fd 40%,#ddd6fe 60%,#ede9fe 80%);
          background-size: 200% 100%;
          animation: ks-shimmer 1.6s ease-in-out infinite;
        }
        @keyframes ks-fade-in {
          from { opacity: 0; transform: translateY(6px); }
          to   { opacity: 1; transform: translateY(0); }
        }
        #root:empty .ks-splash-inner {
          animation: ks-fade-in 0.4s ease-out 0.1s both;
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .ks-shimmer { background: #ede9fe; }
      }
      /* Branded splash — visible before React mounts */
      #root:empty {
        position: fixed;
        inset: 0;
        background: #080612;
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
    </style>
  </head>
  <body>
    <div id="root" style="min-height:100vh;background:#080612;">
      <!-- Iter 182 — Branded splash: visible before React mounts, replaced when JS loads -->
      <div class="ks-splash-inner" style="display:flex;flex-direction:column;align-items:center;gap:16px;">

              <path d="M 44 54 L 20 54 A 24 24 0 0 0 44 78 Z"/>

            </g>

        </div>
